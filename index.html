<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MANTUL KITCHEN - Premium Frozen Food</title>
    <meta name="description" content="Mantul Kitchen - Premium Frozen Food. Dimsum, Gyoza, Lumpia, Ceker, Bakpao berkualitas restoran bintang lima untuk keluarga Anda." />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
        /* ===== RESET & VARIABLES ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0b0b0c;
            --card: #171719;
            --gold: #d4af37;
            --text: #f5f5f5;
            --muted: #bdbdbd;
            --border: #2a2a2e;
            --success: #25D366;
            --glass: rgba(255, 255, 255, 0.03);
            --shadow: rgba(212, 175, 55, 0.15);
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* ===== SCROLLBAR ===== */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--gold);
            border-radius: 10px;
        }

        /* ===== BUTTON & UTILITY ===== */
        .btn {
            display: inline-block;
            padding: 12px 28px;
            background: var(--gold);
            color: #111;
            border: none;
            border-radius: 999px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            font-family: 'Inter', sans-serif;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.4);
        }

        .btn-wa {
            background: var(--success);
            color: #fff;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            font-size: 0.85rem;
        }

        .btn-wa:hover {
            box-shadow: 0 0 30px rgba(37, 211, 102, 0.4);
        }

        /* ===== HERO SECTION ===== */
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px 20px;
            background: radial-gradient(circle at 30% 20%, rgba(212, 175, 55, 0.08), transparent 60%),
                radial-gradient(circle at 70% 80%, rgba(212, 175, 55, 0.05), transparent 50%),
                var(--bg);
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '🥟';
            position: absolute;
            font-size: 400px;
            opacity: 0.03;
            right: -80px;
            top: -120px;
            transform: rotate(20deg);
        }

        .hero-content {
            max-width: 800px;
            position: relative;
            z-index: 2;
        }

        .brand-logo {
            width: 100%;
            max-width: 320px;
            height: auto;
            margin-bottom: 20px;
            filter: drop-shadow(0 10px 40px rgba(212, 175, 55, 0.2));
            animation: logoIn 1.2s ease-out forwards;
        }

        @keyframes logoIn {
            0% {
                opacity: 0;
                transform: scale(0.8) translateY(-30px);
            }
            100% {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .hero h1 {
            font-size: 3.2rem;
            font-weight: 800;
            color: var(--gold);
            letter-spacing: 4px;
            margin-bottom: 8px;
            text-shadow: 0 0 40px rgba(212, 175, 55, 0.15);
        }

        .hero .subtitle {
            font-size: 1.2rem;
            color: var(--muted);
            font-weight: 300;
            letter-spacing: 2px;
            margin-bottom: 6px;
        }

        .hero .tagline {
            font-style: italic;
            color: #aaa;
            font-size: 1rem;
            max-width: 600px;
            margin: 10px auto 25px;
            border-top: 1px solid rgba(212, 175, 55, 0.15);
            padding-top: 15px;
        }

        .hero .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
        }

        .staff-link {
            position: absolute;
            top: 20px;
            right: 30px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(6px);
            border: 1px solid #333;
            padding: 8px 18px;
            border-radius: 30px;
            color: #888;
            font-size: 0.75rem;
            text-decoration: none;
            transition: 0.3s;
            z-index: 10;
            font-weight: 500;
        }

        .staff-link:hover {
            background: var(--gold);
            color: #111;
            border-color: var(--gold);
        }

        /* ===== MASCOT FLOATING ===== */
        .mascot {
            position: fixed;
            bottom: 30px;
            right: 30px;
            font-size: 70px;
            z-index: 999;
            animation: floatMascot 3.5s ease-in-out infinite;
            cursor: pointer;
            filter: drop-shadow(0 10px 30px rgba(212, 175, 55, 0.3));
            transition: transform 0.3s;
            user-select: none;
        }

        .mascot:hover {
            transform: scale(1.2) rotate(-10deg);
        }

        @keyframes floatMascot {
            0% {
                transform: translateY(0px) rotate(-3deg);
            }
            50% {
                transform: translateY(-25px) rotate(3deg);
            }
            100% {
                transform: translateY(0px) rotate(-3deg);
            }
        }

        /* ===== CONTAINER ===== */
        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 40px 20px 60px;
        }

        .section-title {
            text-align: center;
            font-size: 2rem;
            font-weight: 700;
            color: var(--gold);
            margin-bottom: 40px;
            letter-spacing: 1px;
        }

        .section-title::after {
            content: '';
            display: block;
            width: 80px;
            height: 3px;
            background: var(--gold);
            margin: 12px auto 0;
            border-radius: 10px;
        }

        /* ===== FILTER BUTTONS ===== */
        .filter-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-bottom: 40px;
        }

        .filter-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--muted);
            padding: 8px 22px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.3s;
            font-family: 'Inter', sans-serif;
        }

        .filter-btn.active,
        .filter-btn:hover {
            background: var(--gold);
            color: #111;
            border-color: var(--gold);
        }

        /* ===== MENU GRID ===== */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
        }

        /* ===== PRODUCT CARD (GLASSMORPHISM) ===== */
        .product-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 24px;
            padding: 24px 20px 20px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        .product-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.02), transparent 60%);
            pointer-events: none;
        }

        .product-card:hover {
            transform: translateY(-12px) scale(1.01);
            border-color: var(--gold);
            box-shadow: 0 20px 50px rgba(212, 175, 55, 0.12);
            background: rgba(255, 255, 255, 0.06);
        }

        .product-icon {
            font-size: 3.2rem;
            text-align: center;
            margin-bottom: 8px;
            filter: drop-shadow(0 8px 16px rgba(0, 0, 0, 0.5));
        }

        .product-name {
            font-size: 1.2rem;
            font-weight: 700;
            color: #fff;
            line-height: 1.3;
            margin-bottom: 2px;
        }

        .product-weight {
            font-size: 0.8rem;
            color: var(--muted);
            background: rgba(255, 255, 255, 0.04);
            display: inline-block;
            padding: 2px 14px;
            border-radius: 20px;
            border: 1px solid var(--border);
            margin: 4px 0 10px;
            font-weight: 500;
        }

        /* Badge Serving */
        .badge-serving {
            display: inline-block;
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-right: 6px;
        }
        .badge-goreng {
            background: #ff8c00;
            color: #111;
        }
        .badge-kukus {
            background: #00bcd4;
            color: #111;
        }
        .badge-mix {
            background: #9c27b0;
            color: #fff;
        }

        .product-storage {
            font-size: 0.7rem;
            color: #888;
            display: flex;
            align-items: center;
            gap: 5px;
            margin-top: 4px;
        }

        .product-desc {
            font-size: 0.85rem;
            color: #b0b0b0;
            margin: 8px 0 12px;
            flex-grow: 1;
            line-height: 1.5;
        }

        .product-price-section {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px dashed rgba(255, 255, 255, 0.06);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .product-price {
            font-size: 1.2rem;
            font-weight: 800;
            color: var(--gold);
        }

        .product-price small {
            font-size: 0.7rem;
            font-weight: 400;
            color: #888;
        }

        .best-seller-tag {
            position: absolute;
            top: 12px;
            right: 12px;
            background: #ff4d4d;
            color: #fff;
            font-size: 0.65rem;
            font-weight: 700;
            padding: 4px 12px;
            border-radius: 20px;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 12px rgba(255, 77, 77, 0.3);
        }

        /* ===== LOADING ===== */
        #loading {
            text-align: center;
            padding: 60px 0;
            color: var(--gold);
            font-size: 1.1rem;
        }

        #loading span {
            display: inline-block;
            animation: pulseText 1.4s infinite;
        }

        @keyframes pulseText {
            0%,
            100% {
                opacity: 0.3;
            }
            50% {
                opacity: 1;
            }
        }

        /* ===== FOOTER ===== */
        .footer {
            text-align: center;
            padding: 40px 20px;
            border-top: 1px solid #1a1a1e;
            color: #666;
            font-size: 0.8rem;
        }

        .footer span {
            color: var(--gold);
            font-weight: 600;
        }

        .footer .social {
            margin-top: 10px;
            display: flex;
            justify-content: center;
            gap: 16px;
        }

        .footer .social a {
            color: #666;
            text-decoration: none;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .footer .social a:hover {
            color: var(--gold);
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .hero h1 {
                font-size: 2.2rem;
            }
            .brand-logo {
                max-width: 200px;
            }
            .staff-link {
                position: relative;
                top: 0;
                right: 0;
                display: inline-block;
                margin-top: 15px;
            }
            .mascot {
                font-size: 50px;
                bottom: 15px;
                right: 15px;
            }
            .menu-grid {
                grid-template-columns: 1fr 1fr;
                gap: 16px;
            }
            .product-card {
                padding: 16px;
            }
        }

        @media (max-width: 480px) {
            .menu-grid {
                grid-template-columns: 1fr;
            }
            .hero h1 {
                font-size: 1.8rem;
            }
            .section-title {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>

    <!-- ===== MASCOT ===== -->
    <div class="mascot" id="mascot" title="Hai, saya Panda Mantul!">🐼</div>

    <!-- ===== STAFF LINK ===== -->
    <a href="dashboard.html" class="staff-link">🔐 Staff Login</a>

    <!-- ===== HERO ===== -->
    <section class="hero">
        <div class="hero-content">
            <img src="./logo.png" alt="Mantul Kitchen Logo" class="brand-logo" />
            <h1>MANTUL KITCHEN</h1>
            <p class="subtitle">✦ Premium Frozen Food ✦</p>
            <p class="tagline">"Kualitas Restoran Bintang Lima, Kini Hadir di Meja Makan Anda"</p>
            <div class="btn-group">
                <button onclick="scrollToMenu()" class="btn">🍽️ Lihat Menu</button>
                <a href="https://wa.me/62881025532438" target="_blank" class="btn btn-wa">📱 Pesan Sekarang</a>
            </div>
        </div>
    </section>

    <!-- ===== MENU SECTION ===== -->
    <div class="container" id="menuSection">
        <h2 class="section-title">📋 Menu Premium</h2>

        <!-- FILTER -->
        <div class="filter-group" id="filterGroup">
            <button class="filter-btn active" data-filter="all">🍽️ Semua</button>
            <button class="filter-btn" data-filter="goreng">🍤 Goreng</button>
            <button class="filter-btn" data-filter="kukus">🥟 Kukus</button>
            <button class="filter-btn" data-filter="mix">🔥 Mix</button>
        </div>

        <!-- LOADING -->
        <div id="loading"><span>🔄 Memuat Menu Lezat...</span></div>

        <!-- GRID -->
        <div class="menu-grid" id="menuGrid"></div>
    </div>

    <!-- ===== FOOTER ===== -->
    <footer class="footer">
        <p>© 2026 <span>MANTUL KITCHEN</span> — Premium Frozen Food</p>
        <p>❄️ Simpan di Freezer -18°C</p>
        <div class="social">
            <a href="https://wa.me/62881025532438" target="_blank">WhatsApp</a>
            <a href="https://instagram.com/mantulkitchen" target="_blank">Instagram</a>
        </div>
    </footer>

    <!-- ===== SCRIPT ===== -->
    <script>
        // ============================================================
        // 1. KONFIGURASI
        // ============================================================
        const CLOUD_URL = "https://script.google.com/macros/s/AKfycbzI6-_z0LtWs6hC9M0oSak_DdYLtTHBAQqZsQV4CIYAbCmMeW_t3y8yLULYiQZuDiav/exec";
        const WA_NUMBER = "62881025532438";

        // ============================================================
        // 2. DATA STATIS PRODUK (SEBAGAI FALLBACK & ENRICHMENT)
        // ============================================================
        const PRODUCT_METADATA = {
            "Dimsum Premium": {
                type: "mix",
                icon: "🥟",
                weight: "25gr / Pcs",
                storage: "Freezer -18°C",
                desc: "Olahan daging ayam segar bertekstur juicy dengan bumbu umami autentik. Ukuran pas untuk cemilan santai.",
                bestSeller: true
            },
            "Dimsum Jumbo": {
                type: "mix",
                icon: "🥟",
                weight: "35gr / Pcs",
                storage: "Freezer -18°C",
                desc: "Ukuran ekstra besar dengan isian daging ayam padat melimpah. Cocok untuk porsi lebih mengenyangkan.",
                bestSeller: false
            },
            "Dimsum Goreng Lumer": {
                type: "goreng",
                icon: "🍤",
                weight: "30gr / Pcs",
                storage: "Freezer -18°C",
                desc: "Crunchy di luar, super juicy di dalam! Digoreng keemasan dengan isian gurih yang meleleh lumer sempurna.",
                bestSeller: false
            },
            "Gyoza Premium": {
                type: "mix",
                icon: "🥟",
                weight: "25gr / Pcs",
                storage: "Freezer -18°C",
                desc: "Kulit tipis panggang harum, isian daging ayam cincang premium, kucai segar, dan sentuhan jahe autentik.",
                bestSeller: false
            },
            "Gyoza Jumbo": {
                type: "mix",
                icon: "🥟",
                weight: "40gr / Pcs",
                storage: "Freezer -18°C",
                desc: "Gyoza ukuran jumbo dengan isian melimpah. Sensasi Jepang autentik di setiap gigitan.",
                bestSeller: false
            },
            "Wonton Udang Premium": {
                type: "goreng",
                icon: "🍤",
                weight: "20gr / Pcs",
                storage: "Freezer -18°C",
                desc: "Kombinasi daging ayam gurih dan udang utuh renyah, dibalut kulit wonton sutra yang super lembut.",
                bestSeller: true
            },
            "Lumpia Kulit Tahu Ayam": {
                type: "goreng",
                icon: "🌯",
                weight: "25gr / Pcs",
                storage: "Freezer -18°C",
                desc: "Perpaduan ayam segar dan jamur spesial dengan minyak wijen wangi, diselimuti renyahnya kulit tahu premium.",
                bestSeller: false
            },
            "Lumpia Kulit Tahu Udang": {
                type: "goreng",
                icon: "🌯",
                weight: "25gr / Pcs",
                storage: "Freezer -18°C",
                desc: "Udang segar dan bumbu pilihan dibalut lembaran kulit tahu. Renyah wangi dengan isian padat gurih.",
                bestSeller: false
            },
            "Lumpia Ayam Jamur": {
                type: "goreng",
                icon: "🌯",
                weight: "25gr / Pcs",
                storage: "Freezer -18°C",
                desc: "Olahan ayam segar dan potongan jamur spesial dengan minyak wijen wangi, diselimuti kulit tahu premium.",
                bestSeller: false
            },
            "Steam Ceker Lada Hitam": {
                type: "kukus",
                icon: "🍗",
                weight: "1 Pack",
                storage: "Freezer -18°C",
                desc: "Slow-steam hingga tulang rawan super empuk. Berpadu sempurna dengan saus lada hitam pekat yang nagih!",
                bestSeller: false
            },
            "Bakpao Karakter Premium": {
                type: "kukus",
                icon: "🐻",
                weight: "1 Pack (isi 6)",
                storage: "Freezer -18°C",
                desc: "Bakpao selembut awan dengan bentuk karakter menggemaskan. 100% Halal, tanpa pengawet, rebutan anak-anak!",
                bestSeller: true
            }
        };

        // ============================================================
        // 3. FORMAT RUPIAH
        // ============================================================
        function formatRupiah(num) {
            return "Rp " + Math.round(num).toLocaleString('id-ID');
        }

        // ============================================================
        // 4. RENDER MENU
        // ============================================================
        function renderMenu(products, filterType) {
            const grid = document.getElementById('menuGrid');
            const loading = document.getElementById('loading');
            loading.style.display = 'none';

            if (!products || Object.keys(products).length === 0) {
                grid.innerHTML =
                    `<p style="text-align:center;color:#888;grid-column:1/-1;">Menu sedang disiapkan. Hubungi admin via WhatsApp.</p>`;
                return;
            }

            let html = '';
            const keys = Object.keys(products);

            for (let sku of keys) {
                const prod = products[sku];
                const name = prod.name || sku;
                const variants = prod.variants || [];
                const meta = PRODUCT_METADATA[name] || { type: "mix", icon: "🥟", weight: "Variatif", storage: "Freezer -18°C",
                    desc: "", bestSeller: false };

                // Filter
                if (filterType && filterType !== 'all' && meta.type !== filterType) continue;

                // Ambil harga termurah
                let displayPrice = 0;
                let displayLabel = '';
                if (variants.length > 0) {
                    let minPrice = Infinity;
                    let minLabel = '';
                    variants.forEach(v => {
                        if (v.pricePerPack < minPrice) {
                            minPrice = v.pricePerPack;
                            minLabel = v.label;
                        }
                    });
                    displayPrice = minPrice;
                    displayLabel = minLabel;
                }

                // Badge
                let badgeHtml = '';
                if (meta.type === 'goreng') badgeHtml =
                `<span class="badge-serving badge-goreng">🍤 Goreng</span>`;
                else if (meta.type === 'kukus') badgeHtml =
                `<span class="badge-serving badge-kukus">🥟 Kukus</span>`;
                else if (meta.type === 'mix') badgeHtml =
                `<span class="badge-serving badge-mix">🔥 Mix</span>`;

                // Best Seller
                let bestHtml = meta.bestSeller ?
                    `<span class="best-seller-tag">🔥 BEST SELLER</span>` :
                    '';

                // WA Link
                let waMsg =
                `Halo Mantul Kitchen, saya tertarik dengan *${name}*. Bisa info stok & harga terbaru?`;
                let waLink =
                `https://wa.me/${WA_NUMBER}?text=${encodeURIComponent(waMsg)}`;

                html += `
                    <div class="product-card">
                        ${bestHtml}
                        <div class="product-icon">${meta.icon}</div>
                        <div class="product-name">${name}</div>
                        <div class="product-weight">⚖️ ${meta.weight}</div>
                        <div style="margin-bottom: 6px;">${badgeHtml}</div>
                        <div class="product-storage">❄️ ${meta.storage}</div>
                        ${meta.desc ? `<div class="product-desc">${meta.desc}</div>` : ''}
                        <div class="product-price-section">
                            <span class="product-price">${displayPrice > 0 ? formatRupiah(displayPrice) : 'Hubungi'}<small> ${displayLabel ? '/ ' + displayLabel : ''}</small></span>
                            <a href="${waLink}" target="_blank" class="btn btn-wa" style="padding:8px 14px;font-size:0.75rem;">📱 Pesan</a>
                        </div>
                    </div>
                `;
            }

            if (!html) {
                html =
                    `<p style="text-align:center;color:#888;grid-column:1/-1;">Tidak ada produk dengan filter ini.</p>`;
            }

            grid.innerHTML = html;
        }

        // ============================================================
        // 5. LOAD DARI CLOUD
        // ============================================================
        let currentFilter = 'all';

        async function loadCatalog() {
            try {
                const response = await fetch(CLOUD_URL);
                const data = await response.json();

                let catalog = data.productCatalog || {};

                // Jika catalog kosong, fallback ke default
                if (Object.keys(catalog).length === 0) {
                    console.warn('Catalog kosong, menggunakan data default.');
                    const defaultNames = [
                        'Dimsum Premium', 'Dimsum Jumbo', 'Dimsum Goreng Lumer',
                        'Gyoza Premium', 'Gyoza Jumbo', 'Wonton Udang Premium',
                        'Lumpia Kulit Tahu Ayam', 'Lumpia Kulit Tahu Udang', 'Lumpia Ayam Jamur',
                        'Steam Ceker Lada Hitam', 'Bakpao Karakter Premium'
                    ];
                    defaultNames.forEach((name, idx) => {
                        const sku = 'M-' + String(idx + 1).padStart(3, '0');
                        catalog[sku] = {
                            sku: sku,
                            name: name,
                            cogs: 1000,
                            variants: [{ label: "Pack", pcsPerPack: 1, pricePerPack: 15000 }]
                        };
                    });
                }

                renderMenu(catalog, currentFilter);
            } catch (error) {
                console.error('Gagal memuat menu:', error);
                document.getElementById('loading').innerHTML = '⚠️ Gagal memuat menu. Silakan refresh atau hubungi admin.';
                // Fallback default
                const defaultCatalog = {};
                const defaultNames = [
                    'Dimsum Premium', 'Dimsum Jumbo', 'Dimsum Goreng Lumer',
                    'Gyoza Premium', 'Gyoza Jumbo', 'Wonton Udang Premium',
                    'Lumpia Kulit Tahu Ayam', 'Lumpia Kulit Tahu Udang', 'Lumpia Ayam Jamur',
                    'Steam Ceker Lada Hitam', 'Bakpao Karakter Premium'
                ];
                defaultNames.forEach((name, idx) => {
                    const sku = 'M-' + String(idx + 1).padStart(3, '0');
                    defaultCatalog[sku] = { sku: sku, name: name, cogs: 1000, variants: [{ label: "Pack", pcsPerPack: 1,
                            pricePerPack: 15000 }] };
                });
                renderMenu(defaultCatalog, currentFilter);
            }
        }

        // ============================================================
        // 6. FILTER LOGIC
        // ============================================================
        function setupFilters() {
            const buttons = document.querySelectorAll('.filter-btn');
            buttons.forEach(btn => {
                btn.addEventListener('click', function() {
                    buttons.forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    currentFilter = this.dataset.filter;
                    loadCatalog(); // reload dengan filter
                });
            });
        }

        // ============================================================
        // 7. SCROLL TO MENU
        // ============================================================
        function scrollToMenu() {
            document.getElementById('menuSection').scrollIntoView({ behavior: 'smooth' });
        }

        // ============================================================
        // 8. MASCOT INTERAKTIF (Klik ubah ekspresi)
        // ============================================================
        document.getElementById('mascot').addEventListener('click', function() {
            const emojis = ['🐼', '🐧', '🐨', '🦊', '🐻‍❄️', '🐱', '🐶'];
            let randomEmoji = emojis[Math.floor(Math.random() * emojis.length)];
            this.textContent = randomEmoji;
            this.style.transform = 'scale(1.3) rotate(15deg)';
            setTimeout(() => {
                this.style.transform = 'scale(1) rotate(0deg)';
            }, 300);
            setTimeout(() => {
                this.textContent = '🐼';
            }, 1500);
        });

        // ============================================================
        // 9. INIT
        // ============================================================
        window.onload = function() {
            setupFilters();
            loadCatalog();
        };
    </script>
</body>
</html>
